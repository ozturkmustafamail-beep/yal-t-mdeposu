{% extends 'base.html' %}

{% block title %}Üye Ol{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card" style="max-width: 600px;">
        <h1 class="auth-title">🚀 Ücretsiz Üye Ol</h1>
        <p class="auth-subtitle">Toptan fiyatları gör, Plus üye ol, %3 indirim kazan</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Ad</label>
                    <input type="text" name="first_name" class="form-control" placeholder="Adınız">
                </div>
                <div class="form-group">
                    <label class="form-label">Soyad</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Soyadınız">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Kullanıcı Adı *</label>
                <input type="text" name="username" class="form-control" placeholder="kullanici_adi" required>
            </div>

            <div class="form-group">
                <label class="form-label">E-posta *</label>
                <input type="email" name="email" class="form-control" placeholder="ornek@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Telefon</label>
                <input type="tel" name="phone" class="form-control" placeholder="0532 123 45 67">
            </div>

            <div class="form-group">
                <label class="form-label">Firma / İşyeri Adı</label>
                <input type="text" name="company_name" class="form-control" placeholder="Firma adınız (opsiyonel)">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Şifre *</label>
                    <input type="password" name="password" class="form-control" placeholder="En az 6 karakter" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Şifre (Tekrar) *</label>
                    <input type="password" name="password2" class="form-control" placeholder="Şifrenizi tekrar girin"
                        required>
                </div>
            </div>

            <hr style="margin: 1.5rem 0; border-color: var(--border);">

            <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 1rem;">📍 Teslimat Adresi (Opsiyonel)</h3>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">İl</label>
                    <select name="city" id="regCitySelect" class="form-select"
                        onchange="loadDistricts(this.value, 'regDistrictSelect')">
                        <option value="">İl seçin...</option>
                        {% for city in cities %}
                        <option value="{{ city.pk }}">{{ city.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">İlçe</label>
                    <select name="district" id="regDistrictSelect" class="form-select">
                        <option value="">Önce il seçin...</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Açık Adres</label>
                <textarea name="address_line" class="form-control" rows="2"
                    placeholder="Mahalle, sokak, bina no..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block mt-2">Üye Ol</button>
        </form>

        <p class="text-center mt-2" style="font-size: 0.85rem; color: var(--text-secondary);">
            Zaten üye misiniz? <a href="{% url 'accounts:login' %}">Giriş yapın</a>
        </p>
    </div>
</div>

<script>
    function loadDistricts(cityId, selectId) {
        const select = document.getElementById(selectId);
        select.innerHTML = '<option value="">Yükleniyor...</option>';
        if (!cityId) { select.innerHTML = '<option value="">Önce il seçin...</option>'; return; }
        fetch('/lokasyon/ilceler/' + cityId + '/')
            .then(r => r.json())
            .then(data => {
                select.innerHTML = '<option value="">İlçe seçin...</option>';
                data.districts.forEach(d => {
                    select.innerHTML += '<option value="' + d.id + '">' + d.name + '</option>';
                });
            });
    }
</script>
{% endblock %}
